name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build / vet / test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25', '1.26']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt (must be clean)
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$files"
            echo "Run: gofmt -w ."
            exit 1
          fi

      - name: Test (race)
        run: go test -race ./...

  fuzz-smoke:
    name: fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Fuzz plan parser (cmd/sig)
        run: .github/scripts/fuzz-smoke.sh FuzzParsePlan ./cmd/sig/ 15s

      - name: Fuzz git diff parser (internal/gitx)
        run: .github/scripts/fuzz-smoke.sh FuzzParseDiffRawZ ./internal/gitx/ 15s

      - name: Fuzz strategy agreement (cell)
        run: .github/scripts/fuzz-smoke.sh FuzzStrategiesAgree ./cell/ 15s
